name: Update content.json from Google Apps Script

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # cada 10 min

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch JSON from Apps Script
        run: |
          mkdir -p assets/data

          # 1) Descargar a archivo temporal (con reintentos)
          curl -L --fail --retry 3 --retry-delay 2 --compressed \
            "https://script.googleusercontent.com/macros/echo?user_content_key=AehSKLgXYIjKhTDY8qyiMdFPOy8OU35plO_-CE9DDWmSGgUGDw1iEIRLUyYC2_OJmykK3XQXhLiFlVAAiOKWwH1-GTk4jadeooqz3TeYYhTSiZFZcrl03z-L9bgPF2TMNdCCGv-1HCIYnHlhVbwUs8nyRTtxO9VXekJJLY6WzDZtZKrZMT4sxCBZ6AwhiaiyIncuIxIKOCZB1fqD5OsRraP1LoPPt0ILpX2CqAtJIkLl17huMZJqpote9cLZ7gXQOgCvZa5IEWHqIP3m6W_oONZYRLFg4CMcKQ&lib=MB3HCBfHz3uGEUm2U78XvlQ8B9ViIiSpe" \
            -o assets/data/content.raw.json

          # 2) (Opcional) Normalizar/validar JSON para commits consistentes
          python -m json.tool assets/data/content.raw.json > assets/data/content.json
          rm -f assets/data/content.raw.json

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/content.json
          git diff --cached --quiet || git commit -m "chore: update content.json"
          git push
